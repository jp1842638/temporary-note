<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Temporary Note</title>
  <link rel="icon" type="image/svg+xml" href="favicon.svg" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <header class="topbar">
    <div class="brand">
      <h1>Temporary Note</h1>
      <p class="subtitle">Nothing is saved. Refresh and it's all gone.</p>
    </div>
    <div class="meta">
      <span id="charCount" class="char-count">0 chars</span>
      <button id="clearBtn" class="clear-btn" title="Clear all">Clear</button>
    </div>
  </header>

  <main>
    <div
      id="editor"
      class="editor"
      contenteditable="true"
      spellcheck="false"
      autofocus
      aria-label="Temporary note editor"
    ></div>
  </main>

  <footer class="hints">
    <span><kbd>Ctrl</kbd>+<kbd>B</kbd> Bold</span>
    <span><kbd>Ctrl</kbd>+<kbd>I</kbd> Italic</span>
    <span><kbd>Ctrl</kbd>+<kbd>U</kbd> Underline</span>
    <span><kbd>Ctrl</kbd>+<kbd>Shift</kbd>+<kbd>V</kbd> Paste as plain text</span>
    <span><kbd>Ctrl</kbd>+<kbd>Z</kbd> / <kbd>Ctrl</kbd>+<kbd>Y</kbd> Undo / Redo</span>
  </footer>

  <script src="js/app.js"></script>
</body>
</html>
